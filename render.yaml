# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy, set OPENAI_API_KEY in the Render dashboard (Environment).

services:
  - type: web
    name: smart-rag-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      # Optional: exact origins (regex already allows *.vercel.app)
      - key: ALLOWED_ORIGINS
        sync: false
